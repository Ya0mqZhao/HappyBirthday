<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #f9eef7 0%, #f1e2f0 100%);
      padding: 1.5rem;
      overflow-x: hidden;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 245, 248, 0.7);
      backdrop-filter: blur(4px);
      padding: 2.8rem 2.2rem;
      border-radius: 60px 60px 60px 60px;
      box-shadow: 0 20px 40px rgba(210, 170, 200, 0.25),
                  0 8px 16px rgba(230, 190, 210, 0.15);
      border: 2px solid rgba(255, 240, 245, 0.7);
      transition: all 0.25s ease;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1, h2, h3 {
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #5f4a5a;
    }

    .greeting {
      font-size: 2.8rem;
      font-weight: 400;
      color: #7a5f74;
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 8px rgba(255, 210, 230, 0.3);
      word-break: break-word;
    }

    .sub-greeting {
      font-size: 1.4rem;
      font-weight: 300;
      color: #8d7486;
      margin-bottom: 2rem;
      border-bottom: 2px dashed #e6cddf;
      padding-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1.8rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      color: #684f63;
      margin-bottom: 0.4rem;
      padding-left: 0.5rem;
    }

    input, select {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 2px solid #f0d7e6;
      border-radius: 50px;
      background: rgba(255, 248, 250, 0.7);
      backdrop-filter: blur(2px);
      font-size: 1rem;
      color: #3f2e3b;
      outline: none;
      transition: 0.2s;
      box-shadow: inset 0 2px 6px rgba(200, 150, 170, 0.08);
    }

    input:focus, select:focus {
      border-color: #dbb6d0;
      background: #fff9fc;
      box-shadow: 0 0 0 6px rgba(220, 180, 200, 0.2);
    }

    input::placeholder {
      color: #b098ab;
      font-weight: 300;
    }

    .btn {
      background: #ebd3e4;
      border: none;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 500;
      color: #4f3b4a;
      box-shadow: 0 6px 0 #d0b2c7, 0 8px 18px rgba(180, 130, 160, 0.2);
      transition: all 0.08s linear;
      cursor: pointer;
      margin: 0.8rem 0 0.2rem 0;
      letter-spacing: 0.5px;
      border: 1px solid #f7e2ed;
    }

    .btn:active {
      transform: translateY(6px);
      box-shadow: 0 0px 0 #d0b2c7, 0 8px 18px rgba(180, 130, 160, 0.15);
    }

    .btn:hover {
      background: #f0dae9;
      color: #3f2b3a;
    }

    .result-area {
      margin-top: 2rem;
      padding: 0.8rem 0;
    }

    .birthday-page {
      background: rgba(255, 240, 245, 0.3);
      border-radius: 48px;
      padding: 1.5rem 1.2rem;
      position: relative;
      z-index: 2;
    }

    .birthday-name {
      font-size: 3.2rem;
      font-weight: 400;
      color: #6b4f64;
      line-height: 1.3;
    }

    .age-badge {
      font-size: 2rem;
      font-weight: 300;
      background: #f3e1ec;
      display: inline-block;
      padding: 0.2rem 2rem;
      border-radius: 80px;
      margin: 0.2rem 0 1.2rem 0;
      color: #5a4153;
      box-shadow: inset 0 1px 6px #f7e4ef;
    }

    .photo-slot {
      background: #f3e3ed;
      border: 3px dashed #dcbed3;
      border-radius: 80px;
      padding: 2rem 1.5rem;
      margin: 1.4rem 0 0.6rem 0;
      color: #836d7b;
      font-weight: 300;
      letter-spacing: 0.5px;
      transition: 0.2s;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-direction: column;
      gap: 0.5rem;
    }

    .photo-slot img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 60px;
      object-fit: contain;
      box-shadow: 0 6px 18px rgba(140, 100, 120, 0.1);
    }

    .photo-slot.has-image {
      border-style: solid;
      background: #f7eaf2;
      padding: 0.8rem;
    }

    .photo-slot .photo-label {
      font-size: 0.8rem;
      color: #a08493;
      background: rgba(255, 255, 255, 0.5);
      padding: 0.2rem 1rem;
      border-radius: 20px;
      margin-top: 0.3rem;
    }

    .countdown-timer {
      background: #f6e9f0;
      border-radius: 60px;
      padding: 1.8rem 1.2rem;
      margin: 1rem 0;
    }

    .timer-digits {
      font-size: 2.2rem;
      font-weight: 350;
      color: #573f50;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem 1.8rem;
    }

    .timer-unit {
      background: #fef6fa;
      padding: 0.2rem 1.2rem;
      border-radius: 50px;
      box-shadow: 0 2px 10px rgba(190, 140, 165, 0.1);
    }

    .timer-unit span {
      font-weight: 400;
      color: #775b6e;
    }

    .comeback-message {
      font-size: 1.3rem;
      margin-top: 1rem;
      color: #785f70;
      background: #f1dce8;
      padding: 0.7rem 1rem;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(2px);
    }

    .hidden {
      display: none !important;
    }

    .text-soft {
      color: #826a79;
    }

    .lang-hint {
      font-size: 0.9rem;
      color: #9a7d8b;
      margin-top: 0.2rem;
      padding-left: 0.8rem;
    }

    hr {
      border: 1px solid #eddae6;
      margin: 1.8rem 0 0.8rem 0;
      opacity: 0.5;
    }
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 10px;
      opacity: 0.85;
      animation: fall linear infinite;
    }

    .confetti-piece.circle {
      border-radius: 50%;
    }

    .confetti-piece.square {
      border-radius: 2px;
      transform: rotate(45deg);
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg) scale(1);
        opacity: 0.85;
      }
      100% {
        transform: translateY(110vh) rotate(720deg) scale(0.5);
        opacity: 0;
      }
    }

    @media (max-width: 500px) {
      .card { padding: 1.8rem 1.2rem; }
      .greeting { font-size: 2.2rem; }
      .birthday-name { font-size: 2.5rem; }
      .timer-digits { font-size: 1.6rem; gap: 0.4rem; }
      .confetti-piece { width: 7px; height: 7px; }
    }
  </style>
</head>
<body>
  <div class="card" id="appContainer">
    <div id="welcomeSection">
      <div class="greeting">Sup bro</div>
      <div class="sub-greeting">answer these short questions for a message!</div>

      <div class="form-group">
        <label for="nameInput">what is your name?</label>
        <input type="text" id="nameInput" placeholder="a name" value="">
      </div>

      <div class="form-group">
        <label for="dobInput">what's your date of birth?</label>
        <input type="date" id="dobInput" value="0000-00-00">
      </div>
      <div class="form-group">
        <label for="langSelect">what language do you prefer your message in?</label>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="zh">简体中文</option>
        </select>
        <div class="lang-hint">these information is one-time use. nothing stores it</div>
      </div>

      <button class="btn" id="submitBtn">submit</button>
    </div>

    <div id="resultSection" class="hidden result-area">
      <div id="dynamicContent"></div>
    </div>
  </div>
  <div id="confettiContainer" class="confetti-container" style="display: none;"></div>

  <script>
    (function() {
      'use strict';
      const PHOTO_URL = "https://oiiai.cat/cat.png";
      const welcomeSection = document.getElementById('welcomeSection');
      const resultSection = document.getElementById('resultSection');
      const dynamicContent = document.getElementById('dynamicContent');
      const confettiContainer = document.getElementById('confettiContainer');

      const nameInput = document.getElementById('nameInput');
      const dobInput = document.getElementById('dobInput');
      const langSelect = document.getElementById('langSelect');
      const submitBtn = document.getElementById('submitBtn');
      function parseDateFromInput(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split('-');
        if (parts.length !== 3) return null;
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1;
        const day = parseInt(parts[2], 10);
        return new Date(year, month, day);
      }
      const i18n = {
        en: {
          titleHappy: '🎂 Happy Birthday',
          agePrefix: 'you\'re now',
          countdownTitle: '⏳ your birthday is in:',
          comeback: '✨ come back on your birthday!',
          defaultName: 'friend',
        },
        zh: {
          titleHappy: '🎂 生日快乐',
          agePrefix: '你现在',
          countdownTitle: '⏳ 你的生日还有：',
          comeback: '✨ 生日当天再来吧！',
          defaultName: '朋友',
        }
      };

      function getLang() {
        return langSelect.value;
      }

      function t(key) {
        const lang = getLang();
        return i18n[lang]?.[key] ?? i18n.en[key];
      }
      let confettiInterval = null;
      let confettiActive = false;
      const colors = ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#e8b4f0', '#f5b4d4', '#b4f5e8', '#f5e8b4', '#e8b4f5', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff'];
      function createConfettiPiece() {
        if (!confettiContainer) return;
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.classList.add(Math.random() > 0.5 ? 'circle' : 'square');
        const size = 6 + Math.random() * 12;
        piece.style.width = size + 'px';
        piece.style.height = size + 'px';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (3 + Math.random() * 4) + 's';
        piece.style.animationDelay = (Math.random() * 2) + 's';
        confettiContainer.appendChild(piece);
        setTimeout(() => {
          if (piece.parentNode) piece.remove();
        }, 7000);
      }
      function startConfetti() {
        if (confettiActive) return;
        confettiActive = true;
        if (confettiContainer) {
          confettiContainer.style.display = 'block';
          confettiContainer.innerHTML = '';
        }
        for (let i = 0; i < 50; i++) {
          createConfettiPiece();
        }
        confettiInterval = setInterval(() => {
          if (!confettiActive) return;
          createConfettiPiece();
        }, 200);
      }
      function stopConfetti() {
        confettiActive = false;
        if (confettiInterval) {
          clearInterval(confettiInterval);
          confettiInterval = null;
        }
        if (confettiContainer) {
          confettiContainer.style.display = 'none';
          confettiContainer.innerHTML = '';
        }
      }
      function computeTimeUntilBirthday(dobDate) {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        let nextBirthday = new Date(today.getFullYear(), dobDate.getMonth(), dobDate.getDate());
        if (nextBirthday < today) {
          nextBirthday.setFullYear(today.getFullYear() + 1);
        }
        const diffMs = nextBirthday - today;
        const within24h = (diffMs >= 0 && diffMs < 86400000);
        let age = today.getFullYear() - dobDate.getFullYear();
        const monthDiff = today.getMonth() - dobDate.getMonth();
        const dayDiff = today.getDate() - dobDate.getDate();
        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
          age--;
        }
        if (within24h) {
          return { type: 'birthday', age: age, diffMs: diffMs };
        }
        let totalSeconds = Math.floor(diffMs / 1000);
        const seconds = totalSeconds % 60;
        const totalMinutes = Math.floor(totalSeconds / 60);
        const minutes = totalMinutes % 60;
        const totalHours = Math.floor(totalMinutes / 60);
        const hours = totalHours % 24;
        const totalDays = Math.floor(totalHours / 24);
        let days = totalDays;
        let months = 0;

        if (days >= 30) {
          months = Math.floor(days / 30.44);
          days = Math.floor(days - months * 30.44);
        }
        if (days < 0) days = 0;

        return { type: 'countdown', age: age, diffMs: diffMs, months: months, days: days, hours: hours, minutes: minutes, seconds: seconds };
      }
      function getPhotoHTML() {
        if (PHOTO_URL && PHOTO_URL.trim() !== '') {
          return `
            <div class="photo-slot has-image">
              <img src="${PHOTO_URL}" alt="birthday photo" />
              <span class="photo-label">${t('photoLabel')}</span>
            </div>
          `;
        } else {
          return `
            <div class="photo-slot" id="photoSlot">
              ${t('photoPlaceholder')}
              <span class="photo-label" style="font-size:0.7rem; opacity:0.6;"></span>
            </div>
          `;
        }
      }
      function renderResult(name, dobStr) {
        const dob = parseDateFromInput(dobStr);
        if (!dob || isNaN(dob.getTime())) {
          alert('put a right birthday twin');
          return;
        }
        const result = computeTimeUntilBirthday(dob);
        const displayName = name.trim() || t('defaultName');
        const photoHtml = getPhotoHTML();
        stopConfetti();

        if (result.type === 'birthday') {
          const ageText = result.age >= 0 ? result.age : '?';
          const title = t('titleHappy');
          const ageLabel = t('agePrefix');

          dynamicContent.innerHTML = `
            <div class="birthday-page">
              <div class="birthday-name">${title} ${displayName}</div>
              <div class="age-badge">${ageLabel} ${ageText}</div>
              ${photoHtml}
              <div style="margin-top: 0.8rem; font-size: 0.95rem; color: #8b7582;">whatchu planning on today?</div>
            </div>
          `;
          startConfetti();
        } else {
          const { months, days, hours, minutes, seconds } = result;
          const parts = [];
          if (months > 0) parts.push({ label: months, unit: months === 1 ? 'month' : 'months' });
          if (days > 0) parts.push({ label: days, unit: days === 1 ? 'day' : 'days' });
          if (hours > 0) parts.push({ label: hours, unit: hours === 1 ? 'hour' : 'hours' });
          if (minutes > 0) parts.push({ label: minutes, unit: minutes === 1 ? 'minute' : 'minutes' });
          if (seconds > 0) parts.push({ label: seconds, unit: seconds === 1 ? 'second' : 'seconds' });
          if (parts.length === 0) {
            parts.push({ label: 0, unit: 'seconds' });
          }
          const unitMap = {
            en: { month: 'month', months: 'months', day: 'day', days: 'days', hour: 'hour', hours: 'hours', minute: 'minute', minutes: 'minutes', second: 'second', seconds: 'seconds' },
            zh: { month: '个月', months: '个月', day: '天', days: '天', hour: '小时', hours: '小时', minute: '分钟', minutes: '分钟', second: '秒', seconds: '秒' }
          };
          const units = unitMap[getLang()] || unitMap.en;
          const timerHtml = parts.map(p => {
            const unitLabel = units[p.unit] || p.unit;
            return `<div class="timer-unit"><span>${p.label}</span> ${unitLabel}</div>`;
          }).join('');
          const countdownTitle = t('countdownTitle');
          const comebackMsg = t('comeback');
          dynamicContent.innerHTML = `
            <div class="countdown-timer">
              <div style="font-size: 1.7rem; margin-bottom: 1rem; color: #684f63;">${countdownTitle}</div>
              <div class="timer-digits">${timerHtml}</div>
              <div class="comeback-message">${comebackMsg}</div>
              <div style="margin-top: 1.2rem; opacity: 0.6; font-size: 0.9rem; color: #7a6472;">${displayName} · ${dob.toLocaleDateString()}</div>
            </div>
            ${photoHtml}
          `;
        }
        welcomeSection.classList.add('hidden');
        resultSection.classList.remove('hidden');
      }
      function handleSubmit() {
        const name = nameInput.value.trim() || t('defaultName');
        const dob = dobInput.value;
        if (!dob) {
          alert('Put a birthdat');
          return;
        }
        renderResult(name, dob);
      }
      submitBtn.addEventListener('click', handleSubmit);
      document.querySelectorAll('#nameInput, #dobInput, #langSelect').forEach(function(el) {
        el.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            handleSubmit();
          }
        });
      });
      window.addEventListener('beforeunload', function() {
        stopConfetti();
      });
    })();
  </script>
</body>
</html>
